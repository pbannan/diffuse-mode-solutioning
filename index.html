<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diffuse Mode Solutioning</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { background: #0d0d0d; }
    textarea { resize: none; }
    textarea:focus { outline: none; }
    input:focus { outline: none; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

    .tab { cursor: pointer; padding: 6px 0; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; border-bottom: 1px solid transparent; transition: all 0.2s; color: #777; user-select: none; }
    .tab.active { color: #e8e4d9; border-bottom-color: #e8e4d9; }
    .tab:hover { color: #999; }

    .entry { border-bottom: 1px solid #1a1a1a; padding: 20px 0; animation: fi 0.3s ease; }
    .entry:last-child { border-bottom: none; }
    .entry.archived { opacity: 0.4; }

    @keyframes fi { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    .save-btn { background: #e8e4d9; color: #0d0d0d; border: none; padding: 10px 28px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 0.1em; cursor: pointer; transition: opacity 0.2s; }
    .save-btn:hover:not(:disabled) { opacity: 0.85; }
    .save-btn:disabled { opacity: 0.4; cursor: default; }

    .ghost-btn { background: transparent; color: #666; border: none; font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.1em; cursor: pointer; transition: color 0.2s; text-transform: uppercase; padding: 0; line-height: 1; }
    .ghost-btn:hover { color: #888; }
    .ghost-btn.danger:hover { color: #8a4a4a; }
    .ghost-btn.accent:hover { color: #e8e4d9; }

    .inline-btn { background: transparent; color: #555; border: none; font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.08em; cursor: pointer; transition: color 0.2s; padding: 0; line-height: 1; }
    .inline-btn:hover { color: #999; }

    .insight-btn { background: transparent; color: #555; border: 1px solid #2a2a2a; padding: 8px 20px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.08em; cursor: pointer; transition: all 0.2s; }
    .insight-btn:hover:not(:disabled) { color: #e8e4d9; border-color: #555; }
    .insight-btn:disabled { opacity: 0.4; cursor: default; }

    .chip { display: inline-flex; align-items: center; padding: 4px 10px; border: 1px solid #333; font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.08em; cursor: pointer; transition: all 0.15s; color: #777; background: transparent; user-select: none; margin: 3px 3px 3px 0; }
    .chip:hover { border-color: #555; color: #aaa; }
    .chip.selected { border-color: #666; color: #c8c4b8; background: #161616; }

    .field-label { font-size: 10px; letter-spacing: 0.14em; color: #666; text-transform: uppercase; margin-bottom: 10px; }

    .text-area { width: 100%; background: #111; border: 1px solid #1e1e1e; color: #e8e4d9; font-family: 'IBM Plex Mono', monospace; font-size: 13px; padding: 14px 16px; line-height: 1.7; }
    .text-area:focus { border-color: #2a2a2a; }

    .tag-input { background: transparent; border: none; border-bottom: 1px solid #222; color: #777; font-family: 'IBM Plex Mono', monospace; font-size: 10px; padding: 3px 0; letter-spacing: 0.08em; width: 120px; }
    .tag-input::placeholder { color: #444; }
    .tag-input:focus { border-bottom-color: #444; }

    .toggle-row { display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; }
    .toggle-box { width: 14px; height: 14px; border: 1px solid #333; display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; }
    .toggle-box.checked { border-color: #666; background: #1a1a1a; }
    .toggle-box.checked::after { content: '×'; color: #c8c4b8; font-size: 11px; line-height: 1; }

    .history-item { padding: 10px 0; border-bottom: 1px solid #161616; display: flex; gap: 12px; align-items: flex-start; }
    .history-item:last-child { border-bottom: none; }

    .key-input { width: 100%; background: #111; border: 1px solid #1e1e1e; color: #e8e4d9; font-family: 'IBM Plex Mono', monospace; font-size: 12px; padding: 10px 14px; letter-spacing: 0.04em; }
    .key-input:focus { border-color: #333; }

    .morning-block { margin-top: 14px; padding: 12px 14px; background: #0f0f0f; border-left: 1px solid #1e1e1e; animation: fi 0.3s ease; }

    .datetime-input { background: #111; border: 1px solid #1e1e1e; color: #777; font-family: 'IBM Plex Mono', monospace; font-size: 11px; padding: 6px 10px; letter-spacing: 0.04em; color-scheme: dark; }
    .datetime-input:focus { border-color: #333; outline: none; }

    .privacy-panel { margin-top:16px; padding:16px; background:#111; border:1px solid #1a1a1a; animation: fi 0.3s ease; }
    .privacy-panel pre { font-family:'IBM Plex Mono',monospace; font-size:11px; color:#666; line-height:1.65; white-space:pre-wrap; word-break:break-word; max-height:220px; overflow-y:auto; margin-bottom:12px; border-bottom:1px solid #1a1a1a; padding-bottom:12px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STORAGE_KEY = "nightly-focus-log";
    const API_KEY_STORAGE = "nightly-focus-api-key";
    const NIGHT_PROMPT = "What are you working on?";
    const CATEGORIES = ["Last night's problem", "Work", "Personal", "Health", "Creative", "Relationships", "Other"];
    const PATTERNS_STORAGE = "nightly-focus-patterns-v1";
    const HAIKU_INPUT_COST_PER_M  = 0.80;  // $/1M tokens (claude-haiku-4-5)
    const HAIKU_OUTPUT_COST_PER_M = 4.00;
    const TIME_BOX_OPTIONS = [
      { value: "week",    label: "last week"    },
      { value: "month",   label: "last month"   },
      { value: "quarter", label: "last quarter" },
      { value: "year",    label: "last year"    },
      { value: "all",     label: "all time"     },
    ];

    function formatDate(iso) {
      return new Date(iso).toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric", year: "numeric" });
    }
    function formatTime(iso) {
      return new Date(iso).toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
    }
    function formatShortDate(iso) {
      return new Date(iso).toLocaleDateString("en-US", { month: "short", day: "numeric" });
    }

    function getTimeBoxStart(box) {
      const now = new Date();
      if (box === "week")    return new Date(now - 7 * 24 * 60 * 60 * 1000);
      if (box === "month")   { const d = new Date(now); d.setMonth(d.getMonth() - 1);       return d; }
      if (box === "quarter") { const d = new Date(now); d.setMonth(d.getMonth() - 3);       return d; }
      if (box === "year")    { const d = new Date(now); d.setFullYear(d.getFullYear() - 1); return d; }
      return null; // "all"
    }
    function calcCost(input, output) {
      return (input / 1e6) * HAIKU_INPUT_COST_PER_M + (output / 1e6) * HAIKU_OUTPUT_COST_PER_M;
    }
    function formatCost(usd) {
      if (usd < 0.0001) return "<$0.0001";
      return `$${usd.toFixed(4)}`;
    }
    function toDatetimeLocal(iso) {
      const d = new Date(iso);
      const pad = n => String(n).padStart(2, "0");
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function loadEntries() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return [];
        try { return JSON.parse(b64dec(raw)); } catch { return JSON.parse(raw); } // migrate legacy plain JSON
      } catch { return []; }
    }
    function persistEntries(entries) {
      localStorage.setItem(STORAGE_KEY, b64enc(JSON.stringify(entries)));
    }

    // UTF-8-safe base64 helpers (btoa/atob are Latin-1 only)
    function b64enc(str) {
      return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g,
        (_, p) => String.fromCharCode(parseInt(p, 16))));
    }
    function b64dec(b64) {
      return decodeURIComponent(atob(b64).split("").map(
        c => "%" + c.charCodeAt(0).toString(16).padStart(2, "0")).join(""));
    }

    function downloadFile(content, filename, type) {
      const blob = new Blob([content], { type });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement("a");
      a.href = url; a.download = filename; a.click();
      URL.revokeObjectURL(url);
    }

    function blankMorning() {
      return { wakingThoughts: "", categories: [], ideas: "", relatedToFocus: false };
    }

    // Returns the array of waking log entries for an entry, handling legacy single morningLog
    function getMorningLogs(entry) {
      if (entry.morningLogs?.length) return entry.morningLogs;
      if (entry.morningLog) return [{ id: entry.morningLog.ts || "legacy", ...entry.morningLog }];
      return [];
    }

    function App() {
      const [entries, setEntries] = useState(loadEntries);
      const [view, setView] = useState("tonight");

      // Tonight
      const [nightInput, setNightInput] = useState("");
      const [nightSaved, setNightSaved] = useState(false);

      // Morning — waking entries
      const [wakingDraft, setWakingDraft] = useState(null); // null = read mode
      const [editingWakingId, setEditingWakingId] = useState(null); // "new" or existing waking id
      const [wakingCustomTag, setWakingCustomTag] = useState("");
      const [wakingSaved, setWakingSaved] = useState(false);

      // Log — waking edit (full: text, categories, ideas, datetime)
      const [editingLogWaking, setEditingLogWaking] = useState(null); // { entryId, wakingId }
      const [logWakingDraft, setLogWakingDraft] = useState(null);
      const [logWakingCustomTag, setLogWakingCustomTag] = useState("");

      // Log — night entry edit
      const [editingId, setEditingId] = useState(null);
      const [editDraft, setEditDraft] = useState("");
      const [editDatetime, setEditDatetime] = useState("");

      // Log — history
      const [expandedHistory, setExpandedHistory] = useState(null);

      // Log — archive
      const [showArchived, setShowArchived] = useState(false);

      // Patterns
      const [insight, setInsight] = useState("");
      const [loadingInsight, setLoadingInsight] = useState(false);
      const [insightError, setInsightError] = useState("");
      const [showApiKeyInput, setShowApiKeyInput] = useState(false);
      const [apiKey, setApiKey] = useState(() => {
        const stored = localStorage.getItem(API_KEY_STORAGE);
        if (!stored) return "";
        try { return b64dec(stored); } catch { return stored; } // migrate legacy plain key
      });
      const [rememberKey, setRememberKey] = useState(() => !!localStorage.getItem(API_KEY_STORAGE));
      const [patternTimeBox, setPatternTimeBox] = useState("month");
      const [patternHistory, setPatternHistory] = useState(() => {
        try {
          const r = localStorage.getItem(PATTERNS_STORAGE);
          if (!r) return [];
          try { return JSON.parse(b64dec(r)); } catch { return JSON.parse(r); } // migrate legacy plain JSON
        } catch { return []; }
      });
      const [showPatternHistory, setShowPatternHistory] = useState(false);
      const [lastUsage, setLastUsage] = useState(null);
      const [showClearConfirm, setShowClearConfirm] = useState(false);

      const nightTextareaRef = useRef(null);

      useEffect(() => {
        if (view === "tonight" && nightTextareaRef.current) nightTextareaRef.current.focus();
      }, [view]);

      const activeEntries = entries.filter(e => !e.deleted);
      const mostRecent = activeEntries[0] || null;

      // ── Tonight ──────────────────────────────────────────────
      const saveNight = () => {
        if (!nightInput.trim()) return;
        const entry = {
          id: Date.now(),
          ts: new Date().toISOString(),
          text: nightInput.trim(),
          history: [],
        };
        const next = [entry, ...entries];
        setEntries(next);
        persistEntries(next);
        setNightInput("");
        setNightSaved(true);
        setTimeout(() => setNightSaved(false), 2000);
      };

      // ── Morning — waking entries ──────────────────────────────
      const startNewWaking = () => {
        setWakingDraft(blankMorning());
        setEditingWakingId("new");
      };

      const startEditWaking = (w) => {
        setWakingDraft({ wakingThoughts: w.wakingThoughts, categories: [...w.categories], ideas: w.ideas, relatedToFocus: w.relatedToFocus });
        setEditingWakingId(w.id);
      };

      const cancelWaking = () => { setWakingDraft(null); setEditingWakingId(null); setWakingCustomTag(""); };

      const toggleWakingCategory = (cat) => {
        setWakingDraft(d => ({
          ...d,
          categories: d.categories.includes(cat) ? d.categories.filter(c => c !== cat) : [...d.categories, cat]
        }));
      };

      const addWakingCustomTag = () => {
        const tag = wakingCustomTag.trim();
        if (!tag || wakingDraft.categories.includes(tag)) { setWakingCustomTag(""); return; }
        setWakingDraft(d => ({ ...d, categories: [...d.categories, tag] }));
        setWakingCustomTag("");
      };

      const saveWaking = () => {
        if (!mostRecent) return;
        const existing = getMorningLogs(mostRecent);
        const log = { ...wakingDraft, ts: new Date().toISOString() };
        let updated;
        if (editingWakingId === "new") {
          log.id = String(Date.now());
          updated = [...existing, log];
        } else {
          updated = existing.map(w => w.id === editingWakingId ? { ...w, ...log } : w);
        }
        const next = entries.map(e =>
          e.id === mostRecent.id ? { ...e, morningLogs: updated } : e
        );
        setEntries(next);
        persistEntries(next);
        cancelWaking();
        setWakingSaved(true);
        setTimeout(() => setWakingSaved(false), 2000);
      };

      // ── Log — waking edit ────────────────────────────────────
      const startLogWakingEdit = (entryId, w) => {
        setEditingLogWaking({ entryId, wakingId: w.id });
        setLogWakingDraft({ wakingThoughts: w.wakingThoughts || "", categories: [...w.categories], ideas: w.ideas || "", relatedToFocus: w.relatedToFocus || false, ts: toDatetimeLocal(w.ts) });
        setLogWakingCustomTag("");
      };

      const cancelLogWakingEdit = () => { setEditingLogWaking(null); setLogWakingDraft(null); setLogWakingCustomTag(""); };

      const toggleLogWakingCat = (cat) => {
        setLogWakingDraft(d => ({ ...d, categories: d.categories.includes(cat) ? d.categories.filter(c => c !== cat) : [...d.categories, cat] }));
      };

      const addLogWakingCustomTag = () => {
        const tag = logWakingCustomTag.trim();
        if (!tag || logWakingDraft.categories.includes(tag)) { setLogWakingCustomTag(""); return; }
        setLogWakingDraft(d => ({ ...d, categories: [...d.categories, tag] }));
        setLogWakingCustomTag("");
      };

      const saveLogWaking = () => {
        if (!editingLogWaking) return;
        const { entryId, wakingId } = editingLogWaking;
        const next = entries.map(e => {
          if (e.id !== entryId) return e;
          const logs = getMorningLogs(e);
          const updated = logs.map(w => {
            if (w.id !== wakingId) return w;
            const newTs = logWakingDraft.ts ? new Date(logWakingDraft.ts).toISOString() : w.ts;
            return { ...w, wakingThoughts: logWakingDraft.wakingThoughts, categories: logWakingDraft.categories, ideas: logWakingDraft.ideas, relatedToFocus: logWakingDraft.relatedToFocus, ts: newTs };
          });
          return { ...e, morningLogs: updated };
        });
        setEntries(next);
        persistEntries(next);
        cancelLogWakingEdit();
      };

      // ── Log — edit ────────────────────────────────────────────
      const startEdit = (entry) => {
        setEditingId(entry.id);
        setEditDraft(entry.text);
        setEditDatetime(toDatetimeLocal(entry.ts));
        setExpandedHistory(null);
      };

      const cancelEdit = () => { setEditingId(null); setEditDraft(""); setEditDatetime(""); cancelLogWakingEdit(); };

      const confirmEdit = (entry) => {
        const newText = editDraft.trim();
        if (!newText) { cancelEdit(); return; }
        const newTs = editDatetime ? new Date(editDatetime).toISOString() : entry.ts;
        if (newText === entry.text && newTs === entry.ts) { cancelEdit(); return; }
        const now = new Date().toISOString();
        const historyEntry = { text: entry.text, ts: entry.editedTs || entry.ts };
        const next = entries.map(e =>
          e.id === entry.id
            ? { ...e, text: newText, ts: newTs, editedTs: now, history: [...(e.history || []), historyEntry] }
            : e
        );
        setEntries(next);
        persistEntries(next);
        cancelEdit();
      };

      // ── Log — history ─────────────────────────────────────────
      const restoreVersion = (entry, histIdx) => {
        const version = entry.history[histIdx];
        const now = new Date().toISOString();
        const historyEntry = { text: entry.text, ts: entry.editedTs || entry.ts };
        const newHistory = [...(entry.history || [])];
        newHistory.splice(histIdx, 1);
        newHistory.push(historyEntry);
        const next = entries.map(e =>
          e.id === entry.id
            ? { ...e, text: version.text, editedTs: now, history: newHistory }
            : e
        );
        setEntries(next);
        persistEntries(next);
        setExpandedHistory(null);
      };

      // ── Log — archive / restore ───────────────────────────────
      const archiveEntry = (id) => {
        const next = entries.map(e =>
          e.id === id ? { ...e, deleted: true, deletedAt: new Date().toISOString() } : e
        );
        setEntries(next);
        persistEntries(next);
      };

      const restoreEntry = (id) => {
        const next = entries.map(e =>
          e.id === id ? { ...e, deleted: false, deletedAt: undefined } : e
        );
        setEntries(next);
        persistEntries(next);
      };

      // ── Patterns ──────────────────────────────────────────────
      const saveApiKey = (k) => {
        setApiKey(k);
        if (k.trim().startsWith("sk-")) setInsightError("");
        if (rememberKey) localStorage.setItem(API_KEY_STORAGE, b64enc(k));
        else localStorage.removeItem(API_KEY_STORAGE);
      };
      const toggleRememberKey = () => {
        const next = !rememberKey;
        setRememberKey(next);
        if (next && apiKey) localStorage.setItem(API_KEY_STORAGE, b64enc(apiKey));
        else localStorage.removeItem(API_KEY_STORAGE);
      };
      const removeStoredKey = () => {
        localStorage.removeItem(API_KEY_STORAGE);
        setApiKey("");
        setRememberKey(false);
      };

      const getInsight = async () => {
        if (timeBoxEntries.length < 3) return;
        if (!apiKey.trim()) { setShowApiKeyInput(true); setInsightError("Enter your Anthropic API key above to enable pattern analysis."); return; }
        setLoadingInsight(true); setInsight(""); setInsightError(""); setLastUsage(null);
        try {
          const sliced = timeBoxEntries.slice(0, 20);
          const log = sliced.map((e, i) => {
            let line = `${i + 1}. [Night ${formatShortDate(e.ts)}] ${e.text}`;
            getMorningLogs(e).forEach((w, wi) => {
              line += `\n   [Waking ${wi + 1} ${formatShortDate(w.ts)}] "${w.wakingThoughts}"`;
              if (w.categories.length) line += ` | Categories: ${w.categories.join(", ")}`;
              if (w.ideas) line += `\n   Ideas: "${w.ideas}"`;
            });
            return line;
          }).join("\n\n");

          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-api-key": apiKey.trim(),
              "anthropic-version": "2023-06-01",
              "anthropic-dangerous-direct-browser-access": "true",
            },
            body: JSON.stringify({
              model: "claude-haiku-4-5-20251001",
              max_tokens: 350,
              messages: [{
                role: "user",
                content: `Here are my recent nightly focus entries and, where captured, what I was thinking about the next morning:\n\n${log}\n\nIn 2-3 sentences: what patterns do you notice across both the evening intentions and the morning thoughts? What does this suggest about where my attention actually lives? Name 1 thing I could do today to address that.`
              }]
            })
          });
          if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err.error?.message || `HTTP ${res.status}`); }
          const data = await res.json();
          const text = data.content[0].text;
          const usage = {
            inputTokens:  data.usage?.input_tokens  ?? 0,
            outputTokens: data.usage?.output_tokens ?? 0,
          };
          usage.costUsd = calcCost(usage.inputTokens, usage.outputTokens);
          setInsight(text);
          setLastUsage(usage);
          const record = {
            id: String(Date.now()),
            ts: new Date().toISOString(),
            timeBox: patternTimeBox,
            entriesCount: sliced.length,
            insight: text,
            usage,
          };
          const nextHistory = [record, ...patternHistory];
          setPatternHistory(nextHistory);
          localStorage.setItem(PATTERNS_STORAGE, b64enc(JSON.stringify(nextHistory)));
        } catch (e) { setInsightError(`Error: ${e.message}`); }
        setLoadingInsight(false);
      };

      const exportData = (format) => {
        const date = new Date().toISOString().slice(0, 10);
        if (format === "json") {
          const payload = JSON.stringify({ exportedAt: new Date().toISOString(), app: "Diffuse Mode Solutioning", entries: activeEntries }, null, 2);
          downloadFile(payload, `diffuse-journal-${date}.json`, "application/json");
        } else {
          const lines = ["=== DIFFUSE MODE JOURNAL EXPORT ===", `Exported: ${new Date().toLocaleString()}`, `Entries: ${activeEntries.length}`, ""];
          activeEntries.forEach(e => {
            lines.push("---");
            lines.push(`${formatDate(e.ts)} · ${formatTime(e.ts)}`);
            lines.push(`FOCUS: ${e.text}`);
            getMorningLogs(e).forEach((w, i) => {
              lines.push(`  Waking ${i + 1}: ${w.wakingThoughts || "(no thoughts logged)"}`);
              if (w.categories.length) lines.push(`  Categories: ${w.categories.join(", ")}`);
              if (w.ideas) lines.push(`  Ideas: ${w.ideas}`);
            });
            lines.push("");
          });
          downloadFile(lines.join("\n"), `diffuse-journal-${date}.txt`, "text/plain");
        }
      };

      const clearAllData = () => {
        localStorage.removeItem(STORAGE_KEY);
        localStorage.removeItem(API_KEY_STORAGE);
        localStorage.removeItem(PATTERNS_STORAGE);
        setEntries([]); setApiKey(""); setRememberKey(false); setPatternHistory([]);
        setInsight(""); setLastUsage(null); setShowClearConfirm(false);
      };

      // ── Derived ───────────────────────────────────────────────
      const archivedEntries = entries.filter(e => e.deleted);
      const today = new Date().toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });
      const wakingDraftHasContent = wakingDraft && (wakingDraft.wakingThoughts.trim() || wakingDraft.ideas.trim() || wakingDraft.categories.length > 0);

      const timeBoxStart = getTimeBoxStart(patternTimeBox);

        activeEntries.flatMap(e => getMorningLogs(e).flatMap(w => w.categories.filter(c => !CATEGORIES.includes(c))))

            {view === "morning" && (

                  <>

            {/* ── LOG ── */}

                                <button className="ghost-btn danger" onClick={() => archiveEntry(entry.id)}>Archive</button>
                              </>

                          </div>
                        </div>

                        {/* Entry text or edit textarea */}

                          <div>

                              value={editDraft}
                              onChange={e => setEditDraft(e.target.value)}

                              style={{ marginBottom: 10 }}
                              autoFocus

                            <div style={{ marginBottom: 12 }}>
                              <div className="field-label" style={{ marginBottom: 4 }}>Date</div>
                              <input type="datetime-local" className="datetime-input" value={editDatetime} onChange={e => setEditDatetime(e.target.value)} />
                            </div>
                            <div style={{ display: "flex", gap: 14 }}>
                              <button className="save-btn" style={{ padding: "8px 20px", fontSize: 11 }} onClick={() => confirmEdit(entry)} disabled={!editDraft.trim()}>Save</button>
                              <button className="ghost-btn" onClick={cancelEdit}>Cancel</button>
                            </div>
                          </div>
                        ) : (
                          <div style={{ fontSize: 13, lineHeight: 1.75, color: "#a8a49a" }}>{entry.text}</div>

                                </>
                              )}
                            </div>

                              className="inline-btn"

                          )}
                        </div>
                        {insightError && <div style={{ marginTop: 14, fontSize: 12, color: "#5a3a3a", lineHeight: 1.6 }}>{insightError}</div>}
                        {insight && (
                          <div style={{ marginTop: 20, animation: "fi 0.4s ease" }}>
                            <div style={{ padding: 16, background: "#111", border: "1px solid #1a1a1a", fontSize: 13, lineHeight: 1.85, color: "#777" }}>
                              {insight}
                            </div>
                            {lastUsage && (
                              <div style={{ marginTop: 6, fontSize: 10, color: "#444", letterSpacing: "0.06em", display: "flex", gap: 16 }}>
                                <span>{lastUsage.inputTokens.toLocaleString()} in · {lastUsage.outputTokens.toLocaleString()} out</span>
                                <span>est. {formatCost(lastUsage.costUsd)}</span>
                              </div>
                            )}
                          </div>
                        )}

                        {/* Pattern history */}
                        {patternHistory.length > 0 && (
                          <div style={{ marginTop: 28 }}>
                            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 6 }}>
                              <button className="inline-btn" onClick={() => setShowPatternHistory(s => !s)}>
                                {showPatternHistory ? "▾" : "▸"} Pattern history ({patternHistory.length})
                              </button>
                              {totalCostUsd > 0 && (
                                <span style={{ fontSize: 10, color: "#3a3a3a", letterSpacing: "0.06em" }}>
                                  total est. {formatCost(totalCostUsd)}
                                </span>
                              )}
                            </div>
                            {showPatternHistory && (
                              <div style={{ paddingLeft: 10, borderLeft: "1px solid #1a1a1a", animation: "fi 0.2s ease" }}>
                                {patternHistory.map(rec => (
                                  <div key={rec.id} style={{ padding: "12px 0", borderBottom: "1px solid #111" }}>
                                    <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 6 }}>
                                      <span style={{ fontSize: 10, color: "#555", letterSpacing: "0.08em" }}>{formatDate(rec.ts)}</span>
                                      <span style={{ fontSize: 10, color: "#444" }}>
                                        {TIME_BOX_OPTIONS.find(o => o.value === rec.timeBox)?.label ?? rec.timeBox} · {rec.entriesCount} {rec.entriesCount === 1 ? "entry" : "entries"}
                                      </span>
                                      {rec.usage?.inputTokens != null && (
                                        <span style={{ fontSize: 10, color: "#3a3a3a" }}>
                                          {(rec.usage.inputTokens + rec.usage.outputTokens).toLocaleString()} tokens · est. {formatCost(rec.usage.costUsd)}
                                        </span>
                                      )}
                                    </div>
                                    <div style={{ fontSize: 12, color: "#555", lineHeight: 1.75 }}>{rec.insight}</div>
                                  </div>
                                ))}
                              </div>
                            )}
                          </div>
                        )}
                      </div>
                    )}

                    {activeEntries.length < 3 && activeEntries.length > 0 && (
                      <div style={{ marginTop: 28, fontSize: 10, color: "#555", letterSpacing: "0.06em" }}>
                        {3 - activeEntries.length} more {3 - activeEntries.length === 1 ? "entry" : "entries"} until pattern analysis unlocks.
                      </div>
                    )}

                    {/* Clear all data */}
                    <div style={{ marginTop: 40, paddingTop: 20, borderTop: "1px solid #111" }}>
                      {!showClearConfirm ? (
                        <button className="ghost-btn danger" onClick={() => { setShowClearConfirm(true); setTimeout(() => setShowClearConfirm(false), 3000); }}>
                          Clear all data
                        </button>
                      ) : (
                        <div style={{ display: "flex", gap: 14, alignItems: "center" }}>
                          <button className="ghost-btn danger" onClick={clearAllData}>Confirm — this cannot be undone</button>
                          <button className="ghost-btn" onClick={() => setShowClearConfirm(false)}>Cancel</button>
                        </div>
                      )}
                    </div>

                  </>
                )}
              </div>
            )}

            {/* Global footer */}
            <div style={{ marginTop: 60, paddingTop: 16, borderTop: "1px solid #111", fontSize: 10, color: "#3a3a3a", letterSpacing: "0.05em", lineHeight: 1.8 }}>
              Data is stored locally and obfuscated to prevent accidental discovery. It is never shared without your permission.
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
