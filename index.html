<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diffuse Mode Solutioning</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/marked@9/marked.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { background: #0d0d0d; }
    textarea { resize: none; }
    textarea:focus { outline: none; }
    input:focus { outline: none; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

    .tab { cursor: pointer; padding: 6px 0; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; border-bottom: 1px solid transparent; transition: all 0.2s; color: #777; user-select: none; }
    .tab.active { color: #e8e4d9; border-bottom-color: #e8e4d9; }
    .tab:hover { color: #999; }

    .entry { border-bottom: 1px solid #1a1a1a; padding: 20px 0; animation: fi 0.3s ease; }
    .entry:last-child { border-bottom: none; }
    .entry.archived { opacity: 0.4; }

    @keyframes fi { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    .save-btn { background: #e8e4d9; color: #0d0d0d; border: none; padding: 10px 28px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 0.1em; cursor: pointer; transition: opacity 0.2s; }
    .save-btn:hover:not(:disabled) { opacity: 0.85; }
    .save-btn:disabled { opacity: 0.4; cursor: default; }

    .ghost-btn { background: transparent; color: #666; border: none; font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.1em; cursor: pointer; transition: color 0.2s; text-transform: uppercase; padding: 0; line-height: 1; }
    .ghost-btn:hover { color: #888; }
    .ghost-btn.danger:hover { color: #8a4a4a; }
    .ghost-btn.accent:hover { color: #e8e4d9; }

    .inline-btn { background: transparent; color: #555; border: none; font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.08em; cursor: pointer; transition: color 0.2s; padding: 0; line-height: 1; }
    .inline-btn:hover { color: #999; }

    .insight-btn { background: #4ade80; color: #0a0a0a; border: none; padding: 10px 24px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.08em; cursor: pointer; transition: all 0.2s; font-weight: 500; }
    .insight-btn:hover:not(:disabled) { background: #6aee90; }
    .insight-btn:disabled { opacity: 0.35; cursor: default; }

    .chip { display: inline-flex; align-items: center; padding: 4px 10px; border: 1px solid #333; font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.08em; cursor: pointer; transition: all 0.15s; color: #777; background: transparent; user-select: none; margin: 3px 3px 3px 0; }
    @media (hover: hover) and (pointer: fine) { .chip:hover { border-color: #555; color: #aaa; } }
    .chip.selected { border-color: #666; color: #c8c4b8; background: #161616; }

    .field-label { font-size: 10px; letter-spacing: 0.14em; color: #666; text-transform: uppercase; margin-bottom: 10px; }

    .text-area { width: 100%; background: #111; border: 1px solid #1e1e1e; color: #e8e4d9; font-family: 'IBM Plex Mono', monospace; font-size: 13px; padding: 14px 16px; line-height: 1.7; }
    .text-area:focus { border-color: #2a2a2a; }

    .tag-input { background: transparent; border: none; border-bottom: 1px solid #222; color: #777; font-family: 'IBM Plex Mono', monospace; font-size: 10px; padding: 3px 0; letter-spacing: 0.08em; width: 120px; }
    .tag-input::placeholder { color: #444; }
    .tag-input:focus { border-bottom-color: #444; }

    .toggle-row { display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; }
    .toggle-box { width: 14px; height: 14px; border: 1px solid #333; display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; }
    .toggle-box.checked { border-color: #666; background: #1a1a1a; }
    .toggle-box.checked::after { content: '×'; color: #c8c4b8; font-size: 11px; line-height: 1; }

    .history-item { padding: 10px 0; border-bottom: 1px solid #161616; display: flex; gap: 12px; align-items: flex-start; }
    .history-item:last-child { border-bottom: none; }

    .key-input { width: 100%; background: #111; border: 1px solid #1e1e1e; color: #e8e4d9; font-family: 'IBM Plex Mono', monospace; font-size: 12px; padding: 10px 14px; letter-spacing: 0.04em; }
    .key-input:focus { border-color: #333; }

    .morning-block { margin-top: 14px; padding: 12px 14px; background: #0f0f0f; border-left: 1px solid #1e1e1e; animation: fi 0.3s ease; }

    .datetime-input { background: #111; border: 1px solid #1e1e1e; color: #777; font-family: 'IBM Plex Mono', monospace; font-size: 11px; padding: 6px 10px; letter-spacing: 0.04em; color-scheme: dark; }
    .datetime-input:focus { border-color: #333; outline: none; }

    .privacy-panel { margin-top:16px; padding:16px; background:#111; border:1px solid #1a1a1a; animation: fi 0.3s ease; }
    .privacy-panel pre { font-family:'IBM Plex Mono',monospace; font-size:11px; color:#666; line-height:1.65; white-space:pre-wrap; word-break:break-word; max-height:220px; overflow-y:auto; margin-bottom:12px; border-bottom:1px solid #1a1a1a; padding-bottom:12px; }

    .insight-md p { margin-bottom: 0.75em; }
    .insight-md p:last-child { margin-bottom: 0; }
    .insight-md strong { color: #9a9690; font-weight: 500; }
    .insight-md em { font-style: italic; }
    .insight-md ul, .insight-md ol { padding-left: 1.4em; margin-bottom: 0.75em; }
    .insight-md li { margin-bottom: 0.25em; }
    .insight-md h1, .insight-md h2, .insight-md h3 { font-size: inherit; font-weight: 500; color: #9a9690; margin-bottom: 0.5em; letter-spacing: 0.06em; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const STORAGE_KEY = "nightly-focus-log";
    const API_KEY_STORAGE = "nightly-focus-api-key";
    const NIGHT_PROMPT = "What are you working on?";
    const CATEGORIES = ["Last night's problem", "Work", "Personal", "Health", "Creative", "Relationships", "Other"];
    const PATTERNS_STORAGE = "nightly-focus-patterns-v1";
    const USERS_KEY = "nightly-focus-users";

    function userKey(userId, base) { return `${base}-${userId}`; }

    function loadUsers() {
      try {
        const r = localStorage.getItem(USERS_KEY);
        if (!r) return [];
        try { return JSON.parse(b64dec(r)); } catch { return JSON.parse(r); }
      } catch { return []; }
    }
    function persistUsers(users) {
      localStorage.setItem(USERS_KEY, b64enc(JSON.stringify(users)));
    }
    async function hashPin(pin) {
      const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pin));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
    }

    const HAIKU_INPUT_COST_PER_M  = 0.80;  // $/1M tokens (claude-haiku-4-5)
    const HAIKU_OUTPUT_COST_PER_M = 4.00;
    const TIME_BOX_OPTIONS = [
      { value: "week",    label: "last week"    },
      { value: "month",   label: "last month"   },
      { value: "quarter", label: "last quarter" },
      { value: "year",    label: "last year"    },
      { value: "all",     label: "all time"     },
    ];

    function formatDate(iso) {
      return new Date(iso).toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric", year: "numeric" });
    }
    function formatTime(iso) {
      return new Date(iso).toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
    }
    function formatShortDate(iso) {
      return new Date(iso).toLocaleDateString("en-US", { month: "short", day: "numeric" });
    }

    function getTimeBoxStart(box) {
      const now = new Date();
      if (box === "week")    return new Date(now - 7 * 24 * 60 * 60 * 1000);
      if (box === "month")   { const d = new Date(now); d.setMonth(d.getMonth() - 1);       return d; }
      if (box === "quarter") { const d = new Date(now); d.setMonth(d.getMonth() - 3);       return d; }
      if (box === "year")    { const d = new Date(now); d.setFullYear(d.getFullYear() - 1); return d; }
      return null; // "all"
    }
    function calcCost(input, output) {
      return (input / 1e6) * HAIKU_INPUT_COST_PER_M + (output / 1e6) * HAIKU_OUTPUT_COST_PER_M;
    }
    function formatCost(usd) {
      if (usd < 0.0001) return "<$0.0001";
      return `$${usd.toFixed(4)}`;
    }
    function toDatetimeLocal(iso) {
      const d = new Date(iso);
      const pad = n => String(n).padStart(2, "0");
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function loadEntries(userId) {
      try {
        const raw = localStorage.getItem(userKey(userId, STORAGE_KEY));
        if (!raw) return [];
        try { return JSON.parse(b64dec(raw)); } catch { return JSON.parse(raw); } // migrate legacy plain JSON
      } catch { return []; }
    }
    function persistEntries(userId, entries) {
      localStorage.setItem(userKey(userId, STORAGE_KEY), b64enc(JSON.stringify(entries)));
    }

    // UTF-8-safe base64 helpers (btoa/atob are Latin-1 only)
    function b64enc(str) {
      return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g,
        (_, p) => String.fromCharCode(parseInt(p, 16))));
    }
    function b64dec(b64) {
      return decodeURIComponent(atob(b64).split("").map(
        c => "%" + c.charCodeAt(0).toString(16).padStart(2, "0")).join(""));
    }

    function downloadFile(content, filename, type) {
      const blob = new Blob([content], { type });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement("a");
      a.href = url; a.download = filename; a.click();
      URL.revokeObjectURL(url);
    }

    function blankMorning() {
      return { wakingThoughts: "", categories: [], ideas: "", relatedToFocus: false };
    }

    // Returns the array of waking log entries for an entry, handling legacy single morningLog
    function getMorningLogs(entry) {
      if (entry.morningLogs?.length) return entry.morningLogs;
      if (entry.morningLog) return [{ id: entry.morningLog.ts || "legacy", ...entry.morningLog }];
      return [];
    }

    const UserSelectScreen = ({ users, setAuthSelectedUser, setAuthPinInput, setAuthPinError, setAuthView, setAuthNewUsername, setAuthNewPin, setAuthNewPinConfirm }) => {
      const hasLegacy = !!(localStorage.getItem(STORAGE_KEY) || localStorage.getItem(API_KEY_STORAGE) || localStorage.getItem(PATTERNS_STORAGE));
      return (
        <div>
          <div style={{ fontSize: 11, color: "#666", letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: 28 }}>Select account</div>
          {users.length === 0 ? (
            <div style={{ fontSize: 11, color: "#555", marginBottom: 20 }}>No accounts yet.</div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 24 }}>
              {users.map(u => (
                <button key={u.id} className="ghost-btn" style={{ textAlign: "left", fontSize: 11, padding: "8px 12px", letterSpacing: "0.08em" }}
                  onClick={() => { setAuthSelectedUser(u); setAuthPinInput(""); setAuthPinError(""); setAuthView("login"); }}>
                  {u.username}
                </button>
              ))}
            </div>
          )}
          {hasLegacy && users.length === 0 && (
            <div style={{ fontSize: 10, color: "#555", marginBottom: 16 }}>Existing entries found — create an account to import them.</div>
          )}
          <button className="ghost-btn" style={{ fontSize: 10, letterSpacing: "0.10em" }} onClick={() => { setAuthNewUsername(""); setAuthNewPin(""); setAuthNewPinConfirm(""); setAuthView("create"); }}>
            + Create account
          </button>
          <div style={{ marginTop: 40, fontSize: 10, color: "#444", lineHeight: 1.7 }}>
            All data is stored locally on this device. Each account's entries are separate and cannot be accessed by other accounts.
          </div>
        </div>
      );
    };

    const LoginScreen = ({ authSelectedUser, authPinInput, setAuthPinInput, authPinError, setAuthPinError, doLogin, setAuthView }) => (
      <div>
        <div style={{ fontSize: 11, color: "#666", letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: 8 }}>
          {authSelectedUser && authSelectedUser.username}
        </div>
        <div style={{ fontSize: 10, color: "#555", marginBottom: 24 }}>Enter your PIN to unlock</div>
        <input
          className="key-input"
          type="password"
          inputMode="numeric"
          placeholder="PIN"
          value={authPinInput}
          autoFocus
          onChange={e => { setAuthPinInput(e.target.value); setAuthPinError(""); }}
          onKeyDown={e => { if (e.key === "Enter") doLogin(); }}
          style={{ width: "100%", marginBottom: 16, boxSizing: "border-box" }}
        />
        {authPinError && <div style={{ fontSize: 10, color: "#8a4a4a", marginBottom: 12 }}>{authPinError}</div>}
        <div style={{ display: "flex", gap: 16, alignItems: "center" }}>
          <button className="save-btn" onClick={doLogin}>Unlock</button>
          <button className="ghost-btn" style={{ fontSize: 10 }} onClick={() => { setAuthView("select"); setAuthPinInput(""); setAuthPinError(""); }}>← Back</button>
        </div>
      </div>
    );

    const CreateUserScreen = ({ authNewUsername, setAuthNewUsername, authNewPin, setAuthNewPin, authNewPinConfirm, setAuthNewPinConfirm, authPinError, authCreating, users, doCreateUser, setAuthView, setAuthPinError }) => {
      const hasLegacy = !!(localStorage.getItem(STORAGE_KEY) || localStorage.getItem(API_KEY_STORAGE) || localStorage.getItem(PATTERNS_STORAGE));
      const isFirstUser = users.length === 0;
      return (
        <div>
          <div style={{ fontSize: 11, color: "#666", letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: 28 }}>Create account</div>
          {hasLegacy && isFirstUser && (
            <div style={{ fontSize: 10, color: "#555", marginBottom: 20 }}>Existing entries will be imported to your account.</div>
          )}
          <div className="field-label" style={{ marginBottom: 6 }}>Username</div>
          <input
            className="key-input"
            type="text"
            placeholder="Your name"
            value={authNewUsername}
            autoFocus
            onChange={e => setAuthNewUsername(e.target.value)}
            style={{ width: "100%", marginBottom: 16, boxSizing: "border-box" }}
          />
          <div className="field-label" style={{ marginBottom: 6 }}>PIN</div>
          <input
            className="key-input"
            type="password"
            inputMode="numeric"
            placeholder="Choose a PIN"
            value={authNewPin}
            onChange={e => setAuthNewPin(e.target.value)}
            style={{ width: "100%", marginBottom: 16, boxSizing: "border-box" }}
          />
          <div className="field-label" style={{ marginBottom: 6 }}>Confirm PIN</div>
          <input
            className="key-input"
            type="password"
            inputMode="numeric"
            placeholder="Repeat PIN"
            value={authNewPinConfirm}
            onChange={e => setAuthNewPinConfirm(e.target.value)}
            onKeyDown={e => { if (e.key === "Enter") doCreateUser(); }}
            style={{ width: "100%", marginBottom: 16, boxSizing: "border-box" }}
          />
          {authPinError && <div style={{ fontSize: 10, color: "#8a4a4a", marginBottom: 12 }}>{authPinError}</div>}
          <div style={{ display: "flex", gap: 16, alignItems: "center" }}>
            <button className="save-btn" onClick={doCreateUser} disabled={authCreating}>
              {authCreating ? "Creating..." : "Create account"}
            </button>
            {users.length > 0 && (
              <button className="ghost-btn" style={{ fontSize: 10 }} onClick={() => { setAuthView("select"); setAuthPinError(""); }}>← Back</button>
            )}
          </div>
        </div>
      );
    };

    function App() {
      // Auth
      const [users, setUsers] = useState(loadUsers);
      const [currentUser, setCurrentUser] = useState(null); // { id, username } once logged in
      const [authView, setAuthView] = useState("select");   // "select" | "login" | "create"
      const [authSelectedUser, setAuthSelectedUser] = useState(null);
      const [authPinInput, setAuthPinInput] = useState("");
      const [authPinError, setAuthPinError] = useState("");
      const [authNewUsername, setAuthNewUsername] = useState("");
      const [authNewPin, setAuthNewPin] = useState("");
      const [authNewPinConfirm, setAuthNewPinConfirm] = useState("");
      const [authCreating, setAuthCreating] = useState(false);

      const [entries, setEntries] = useState([]);
      const [view, setView] = useState("tonight");

      // Tonight
      const [nightInput, setNightInput] = useState("");
      const [nightSaved, setNightSaved] = useState(false);

      // Morning — waking entries
      const [wakingDraft, setWakingDraft] = useState(null); // null = read mode
      const [editingWakingId, setEditingWakingId] = useState(null); // "new" or existing waking id
      const [wakingCustomTag, setWakingCustomTag] = useState("");
      const [wakingShowOther, setWakingShowOther] = useState(false);
      const [wakingSaved, setWakingSaved] = useState(false);

      // Log — waking edit (full: text, categories, ideas, datetime)
      const [editingLogWaking, setEditingLogWaking] = useState(null); // { entryId, wakingId }
      const [logWakingDraft, setLogWakingDraft] = useState(null);
      const [logWakingCustomTag, setLogWakingCustomTag] = useState("");
      const [logWakingShowOther, setLogWakingShowOther] = useState(false);

      // Log — night entry edit
      const [editingId, setEditingId] = useState(null);
      const [editDraft, setEditDraft] = useState("");
      const [editDatetime, setEditDatetime] = useState("");

      // Log — history
      const [expandedHistory, setExpandedHistory] = useState(null);

      // Log — archive
      const [showArchived, setShowArchived] = useState(false);

      // Patterns
      const [insight, setInsight] = useState("");
      const [loadingInsight, setLoadingInsight] = useState(false);
      const [insightError, setInsightError] = useState("");
      const [showApiKeyInput, setShowApiKeyInput] = useState(false);
      const [apiKey, setApiKey] = useState("");
      const [rememberKey, setRememberKey] = useState(false);
      const [patternTimeBox, setPatternTimeBox] = useState("month");
      const [patternHistory, setPatternHistory] = useState([]);
      const [showPatternHistory, setShowPatternHistory] = useState(false);
      const [lastUsage, setLastUsage] = useState(null);
      const [showClearConfirm, setShowClearConfirm] = useState(false);

      const nightTextareaRef = useRef(null);

      useEffect(() => {
        if (view === "tonight" && nightTextareaRef.current) nightTextareaRef.current.focus();
      }, [view]);

      // Load per-user data after login; reset when logged out
      useEffect(() => {
        if (!currentUser) {
          setEntries([]); setApiKey(""); setRememberKey(false); setPatternHistory([]);
          return;
        }
        setEntries(loadEntries(currentUser.id));
        const storedKey = localStorage.getItem(userKey(currentUser.id, API_KEY_STORAGE));
        if (storedKey) {
          try { setApiKey(b64dec(storedKey)); setRememberKey(true); } catch { setApiKey(storedKey); setRememberKey(true); }
        }
        const storedPH = localStorage.getItem(userKey(currentUser.id, PATTERNS_STORAGE));
        if (storedPH) {
          try { setPatternHistory(JSON.parse(b64dec(storedPH))); }
          catch { try { setPatternHistory(JSON.parse(storedPH)); } catch {} }
        }
      }, [currentUser && currentUser.id]);

      const activeEntries = entries.filter(e => !e.deleted);
      const mostRecent = activeEntries[0] || null;

      // ── Tonight ──────────────────────────────────────────────
      const saveNight = () => {
        if (!nightInput.trim()) return;
        const entry = {
          id: Date.now(),
          ts: new Date().toISOString(),
          text: nightInput.trim(),
          history: [],
        };
        const next = [entry, ...entries];
        setEntries(next);
        persistEntries(currentUser.id, next);
        setNightInput("");
        setNightSaved(true);
        setTimeout(() => setNightSaved(false), 2000);
      };

      // ── Morning — waking entries ──────────────────────────────
      const startNewWaking = () => {
        setWakingDraft(blankMorning());
        setEditingWakingId("new");
      };

      const startEditWaking = (w) => {
        setWakingDraft({ wakingThoughts: w.wakingThoughts, categories: [...w.categories], ideas: w.ideas, relatedToFocus: w.relatedToFocus });
        setEditingWakingId(w.id);
        setWakingShowOther(w.categories.some(c => !CATEGORIES.includes(c)));
      };

      const cancelWaking = () => { setWakingDraft(null); setEditingWakingId(null); setWakingCustomTag(""); setWakingShowOther(false); };

      const toggleWakingCategory = (cat) => {
        setWakingDraft(d => ({
          ...d,
          categories: d.categories.includes(cat) ? d.categories.filter(c => c !== cat) : [...d.categories, cat]
        }));
      };

      const addWakingCustomTag = () => {
        const tag = wakingCustomTag.trim();
        if (!tag || wakingDraft.categories.includes(tag)) { setWakingCustomTag(""); return; }
        setWakingDraft(d => ({ ...d, categories: [...d.categories, tag] }));
        setWakingCustomTag("");
      };

      const toggleWakingOther = () => {
        if (wakingShowOther) {
          setWakingDraft(d => ({ ...d, categories: d.categories.filter(c => CATEGORIES.includes(c)) }));
          setWakingCustomTag("");
          setWakingShowOther(false);
        } else {
          setWakingShowOther(true);
        }
      };

      const saveWaking = () => {
        if (!mostRecent) return;
        const pendingTag = wakingCustomTag.trim();
        const draftToSave = (pendingTag && !wakingDraft.categories.includes(pendingTag))
          ? { ...wakingDraft, categories: [...wakingDraft.categories, pendingTag] }
          : wakingDraft;
        const existing = getMorningLogs(mostRecent);
        const log = { ...draftToSave, ts: new Date().toISOString() };
        let updated;
        if (editingWakingId === "new") {
          log.id = String(Date.now());
          updated = [...existing, log];
        } else {
          updated = existing.map(w => w.id === editingWakingId ? { ...w, ...log } : w);
        }
        const next = entries.map(e =>
          e.id === mostRecent.id ? { ...e, morningLogs: updated } : e
        );
        setEntries(next);
        persistEntries(currentUser.id, next);
        cancelWaking();
        setWakingSaved(true);
        setTimeout(() => setWakingSaved(false), 2000);
      };

      // ── Log — waking edit ────────────────────────────────────
      const startLogWakingEdit = (entryId, w) => {
        setEditingLogWaking({ entryId, wakingId: w.id });
        setLogWakingDraft({ wakingThoughts: w.wakingThoughts || "", categories: [...w.categories], ideas: w.ideas || "", relatedToFocus: w.relatedToFocus || false, ts: toDatetimeLocal(w.ts) });
        setLogWakingCustomTag("");
        setLogWakingShowOther(w.categories.some(c => !CATEGORIES.includes(c)));
      };

      const cancelLogWakingEdit = () => { setEditingLogWaking(null); setLogWakingDraft(null); setLogWakingCustomTag(""); setLogWakingShowOther(false); };

      const toggleLogWakingCat = (cat) => {
        setLogWakingDraft(d => ({ ...d, categories: d.categories.includes(cat) ? d.categories.filter(c => c !== cat) : [...d.categories, cat] }));
      };

      const addLogWakingCustomTag = () => {
        const tag = logWakingCustomTag.trim();
        if (!tag || logWakingDraft.categories.includes(tag)) { setLogWakingCustomTag(""); return; }
        setLogWakingDraft(d => ({ ...d, categories: [...d.categories, tag] }));
        setLogWakingCustomTag("");
      };

      const toggleLogWakingOther = () => {
        if (logWakingShowOther) {
          setLogWakingDraft(d => ({ ...d, categories: d.categories.filter(c => CATEGORIES.includes(c)) }));
          setLogWakingCustomTag("");
          setLogWakingShowOther(false);
        } else {
          setLogWakingShowOther(true);
        }
      };

      const saveLogWaking = () => {
        if (!editingLogWaking) return;
        const pendingTag = logWakingCustomTag.trim();
        const draftToSave = (pendingTag && !logWakingDraft.categories.includes(pendingTag))
          ? { ...logWakingDraft, categories: [...logWakingDraft.categories, pendingTag] }
          : logWakingDraft;
        const { entryId, wakingId } = editingLogWaking;
        const next = entries.map(e => {
          if (e.id !== entryId) return e;
          const logs = getMorningLogs(e);
          const updated = logs.map(w => {
            if (w.id !== wakingId) return w;
            const newTs = draftToSave.ts ? new Date(draftToSave.ts).toISOString() : w.ts;
            return { ...w, wakingThoughts: draftToSave.wakingThoughts, categories: draftToSave.categories, ideas: draftToSave.ideas, relatedToFocus: draftToSave.relatedToFocus, ts: newTs };
          });
          return { ...e, morningLogs: updated };
        });
        setEntries(next);
        persistEntries(currentUser.id, next);
        cancelLogWakingEdit();
      };

      // ── Log — edit ────────────────────────────────────────────
      const startEdit = (entry) => {
        setEditingId(entry.id);
        setEditDraft(entry.text);
        setEditDatetime(toDatetimeLocal(entry.ts));
        setExpandedHistory(null);
      };

      const cancelEdit = () => { setEditingId(null); setEditDraft(""); setEditDatetime(""); cancelLogWakingEdit(); };

      const confirmEdit = (entry) => {
        const newText = editDraft.trim();
        if (!newText) { cancelEdit(); return; }
        const newTs = editDatetime ? new Date(editDatetime).toISOString() : entry.ts;
        if (newText === entry.text && newTs === entry.ts) { cancelEdit(); return; }
        const now = new Date().toISOString();
        const historyEntry = { text: entry.text, ts: entry.editedTs || entry.ts };
        const next = entries.map(e =>
          e.id === entry.id
            ? { ...e, text: newText, ts: newTs, editedTs: now, history: [...(e.history || []), historyEntry] }
            : e
        );
        setEntries(next);
        persistEntries(currentUser.id, next);
        cancelEdit();
      };

      // ── Log — history ─────────────────────────────────────────
      const restoreVersion = (entry, histIdx) => {
        const version = entry.history[histIdx];
        const now = new Date().toISOString();
        const historyEntry = { text: entry.text, ts: entry.editedTs || entry.ts };
        const newHistory = [...(entry.history || [])];
        newHistory.splice(histIdx, 1);
        newHistory.push(historyEntry);
        const next = entries.map(e =>
          e.id === entry.id
            ? { ...e, text: version.text, editedTs: now, history: newHistory }
            : e
        );
        setEntries(next);
        persistEntries(currentUser.id, next);
        setExpandedHistory(null);
      };

      // ── Log — archive / restore ───────────────────────────────
      const archiveEntry = (id) => {
        const next = entries.map(e =>
          e.id === id ? { ...e, deleted: true, deletedAt: new Date().toISOString() } : e
        );
        setEntries(next);
        persistEntries(currentUser.id, next);
      };

      const restoreEntry = (id) => {
        const next = entries.map(e =>
          e.id === id ? { ...e, deleted: false, deletedAt: undefined } : e
        );
        setEntries(next);
        persistEntries(currentUser.id, next);
      };

      // ── Patterns ──────────────────────────────────────────────
      const saveApiKey = (k) => {
        setApiKey(k);
        if (k.trim().startsWith("sk-")) setInsightError("");
        if (rememberKey) localStorage.setItem(userKey(currentUser.id, API_KEY_STORAGE), b64enc(k));
        else localStorage.removeItem(userKey(currentUser.id, API_KEY_STORAGE));
      };
      const toggleRememberKey = () => {
        const next = !rememberKey;
        setRememberKey(next);
        if (next && apiKey) localStorage.setItem(userKey(currentUser.id, API_KEY_STORAGE), b64enc(apiKey));
        else localStorage.removeItem(userKey(currentUser.id, API_KEY_STORAGE));
      };
      const removeStoredKey = () => {
        localStorage.removeItem(userKey(currentUser.id, API_KEY_STORAGE));
        setApiKey("");
        setRememberKey(false);
      };

      const getInsight = async () => {
        if (timeBoxEntries.length < 3) return;
        if (!apiKey.trim()) { setShowApiKeyInput(true); setInsightError("Enter your Anthropic API key above to enable pattern analysis."); return; }
        setLoadingInsight(true); setInsight(""); setInsightError(""); setLastUsage(null);
        try {
          const sliced = timeBoxEntries.slice(0, 20);
          const log = sliced.map((e, i) => {
            let line = `${i + 1}. [Night ${formatShortDate(e.ts)}] ${e.text}`;
            getMorningLogs(e).forEach((w, wi) => {
              line += `\n   [Waking ${wi + 1} ${formatShortDate(w.ts)}] "${w.wakingThoughts}"`;
              if (w.categories.length) line += ` | Categories: ${w.categories.join(", ")}`;
              if (w.ideas) line += `\n   Ideas: "${w.ideas}"`;
            });
            return line;
          }).join("\n\n");

          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-api-key": apiKey.trim(),
              "anthropic-version": "2023-06-01",
              "anthropic-dangerous-direct-browser-access": "true",
            },
            body: JSON.stringify({
              model: "claude-haiku-4-5-20251001",
              max_tokens: 350,
              messages: [{
                role: "user",
                content: `Here are my recent nightly focus entries and, where captured, what I was thinking about the next morning:\n\n${log}\n\nIn 2-3 sentences: what patterns do you notice across both the evening intentions and the morning thoughts? What does this suggest about where my attention actually lives? Name 1 thing I could do today to address that.`
              }]
            })
          });
          if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err.error?.message || `HTTP ${res.status}`); }
          const data = await res.json();
          const text = data.content[0].text;
          const usage = {
            inputTokens:  data.usage?.input_tokens  ?? 0,
            outputTokens: data.usage?.output_tokens ?? 0,
          };
          usage.costUsd = calcCost(usage.inputTokens, usage.outputTokens);
          setInsight(text);
          setLastUsage(usage);
          const record = {
            id: String(Date.now()),
            ts: new Date().toISOString(),
            timeBox: patternTimeBox,
            entriesCount: sliced.length,
            insight: text,
            usage,
          };
          const nextHistory = [record, ...patternHistory];
          setPatternHistory(nextHistory);
          localStorage.setItem(userKey(currentUser.id, PATTERNS_STORAGE), b64enc(JSON.stringify(nextHistory)));
        } catch (e) { setInsightError(`Error: ${e.message}`); }
        setLoadingInsight(false);
      };

      const exportData = (format) => {
        const date = new Date().toISOString().slice(0, 10);
        if (format === "json") {
          const payload = JSON.stringify({ exportedAt: new Date().toISOString(), app: "Diffuse Mode Solutioning", entries: activeEntries }, null, 2);
          downloadFile(payload, `diffuse-journal-${date}.json`, "application/json");
        } else {
          const lines = ["=== DIFFUSE MODE JOURNAL EXPORT ===", `Exported: ${new Date().toLocaleString()}`, `Entries: ${activeEntries.length}`, ""];
          activeEntries.forEach(e => {
            lines.push("---");
            lines.push(`${formatDate(e.ts)} · ${formatTime(e.ts)}`);
            lines.push(`FOCUS: ${e.text}`);
            getMorningLogs(e).forEach((w, i) => {
              lines.push(`  Waking ${i + 1}: ${w.wakingThoughts || "(no thoughts logged)"}`);
              if (w.categories.length) lines.push(`  Categories: ${w.categories.join(", ")}`);
              if (w.ideas) lines.push(`  Ideas: ${w.ideas}`);
            });
            lines.push("");
          });
          downloadFile(lines.join("\n"), `diffuse-journal-${date}.txt`, "text/plain");
        }
      };

      const clearAllData = () => {
        localStorage.removeItem(userKey(currentUser.id, STORAGE_KEY));
        localStorage.removeItem(userKey(currentUser.id, API_KEY_STORAGE));
        localStorage.removeItem(userKey(currentUser.id, PATTERNS_STORAGE));
        setEntries([]); setApiKey(""); setRememberKey(false); setPatternHistory([]);
        setInsight(""); setLastUsage(null); setShowClearConfirm(false);
      };

      // ── Auth handlers ─────────────────────────────────────────
      const handleLogin = (user) => {
        setCurrentUser({ id: user.id, username: user.username });
        setAuthPinInput("");
        setAuthPinError("");
      };

      const doLogin = () => {
        if (!authPinInput.trim()) { setAuthPinError("Enter your PIN."); return; }
        hashPin(authPinInput).then(hash => {
          if (hash === authSelectedUser.pinHash) {
            handleLogin(authSelectedUser);
          } else {
            setAuthPinError("Incorrect PIN.");
            setAuthPinInput("");
          }
        });
      };

      const doCreateUser = () => {
        if (!authNewUsername.trim()) { setAuthPinError("Enter a username."); return; }
        if (!authNewPin) { setAuthPinError("Choose a PIN."); return; }
        if (authNewPin !== authNewPinConfirm) { setAuthPinError("PINs don't match."); return; }
        setAuthCreating(true);
        hashPin(authNewPin).then(pinHash => {
          const newUser = { id: String(Date.now()), username: authNewUsername.trim(), pinHash, createdAt: new Date().toISOString() };
          // Migrate legacy data for first user
          if (users.length === 0) {
            const legacyEntries = localStorage.getItem(STORAGE_KEY);
            if (legacyEntries) { localStorage.setItem(userKey(newUser.id, STORAGE_KEY), legacyEntries); localStorage.removeItem(STORAGE_KEY); }
            const legacyKey = localStorage.getItem(API_KEY_STORAGE);
            if (legacyKey) { localStorage.setItem(userKey(newUser.id, API_KEY_STORAGE), legacyKey); localStorage.removeItem(API_KEY_STORAGE); }
            const legacyPH = localStorage.getItem(PATTERNS_STORAGE);
            if (legacyPH) { localStorage.setItem(userKey(newUser.id, PATTERNS_STORAGE), legacyPH); localStorage.removeItem(PATTERNS_STORAGE); }
          }
          const nextUsers = [...users, newUser];
          persistUsers(nextUsers);
          setUsers(nextUsers);
          setAuthCreating(false);
          handleLogin(newUser);
        });
      };

      const logout = () => {
        setCurrentUser(null);
        setEntries([]); setNightInput(""); setNightSaved(false);
        setApiKey(""); setRememberKey(false);
        setPatternHistory([]); setInsight(""); setLastUsage(null); setShowPatternHistory(false);
        setAuthView("select"); setAuthPinInput(""); setAuthPinError(""); setAuthSelectedUser(null);
        setView("tonight");
      };

      // ── Derived ───────────────────────────────────────────────
      const archivedEntries = entries.filter(e => e.deleted);
      const today = new Date().toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });
      const wakingDraftHasContent = wakingDraft && (wakingDraft.wakingThoughts.trim() || wakingDraft.ideas.trim() || wakingDraft.categories.length > 0);
      const mostRecentWakings = getMorningLogs(mostRecent || {});
      const timeBoxStart = getTimeBoxStart(patternTimeBox);
      const timeBoxEntries = timeBoxStart ? activeEntries.filter(e => new Date(e.ts) >= timeBoxStart) : activeEntries;
      const totalCostUsd = patternHistory.reduce((sum, r) => sum + (r.usage?.costUsd ?? 0), 0);
      const nextRunEstimate = (() => {
        if (timeBoxEntries.length < 3) return null;
        const sliced = timeBoxEntries.slice(0, 20);
        const logText = sliced.map((e, i) => {
          let line = `${i + 1}. [Night ${formatShortDate(e.ts)}] ${e.text}`;
          getMorningLogs(e).forEach((w, wi) => {
            line += `\n   [Waking ${wi + 1} ${formatShortDate(w.ts)}] "${w.wakingThoughts}"`;
            if (w.categories.length) line += ` | Categories: ${w.categories.join(", ")}`;
            if (w.ideas) line += `\n   Ideas: "${w.ideas}"`;
          });
          return line;
        }).join("\n\n");
        const inputEst  = Math.round(logText.length / 3.5) + 80; // ~3.5 chars/token + ~80 token prompt preamble
        const outputEst = 150; // typical haiku response length for this prompt
        return { tokens: inputEst + outputEst, cost: calcCost(inputEst, outputEst) };
      })();
      const allCustomCategories = [...new Set(
        activeEntries.flatMap(e => getMorningLogs(e).flatMap(w => w.categories.filter(c => !CATEGORIES.includes(c))))
      )];

      // ── Render ────────────────────────────────────────────────
      if (!currentUser) return (
        <div style={{ minHeight: "100vh", background: "#0d0d0d", color: "#e8e4d9", fontFamily: "'IBM Plex Mono', 'Courier New', monospace", display: "flex", alignItems: "center", justifyContent: "center" }}>
          <div style={{ maxWidth: 400, width: "100%", padding: "48px 24px" }}>
            <div style={{ fontSize: 10, letterSpacing: "0.2em", color: "#666", textTransform: "uppercase", marginBottom: 40 }}>Diffuse Mode Solutioning</div>
            {authView === "create"
              ? <CreateUserScreen
                  authNewUsername={authNewUsername} setAuthNewUsername={setAuthNewUsername}
                  authNewPin={authNewPin} setAuthNewPin={setAuthNewPin}
                  authNewPinConfirm={authNewPinConfirm} setAuthNewPinConfirm={setAuthNewPinConfirm}
                  authPinError={authPinError} authCreating={authCreating}
                  users={users} doCreateUser={doCreateUser}
                  setAuthView={setAuthView} setAuthPinError={setAuthPinError}
                />
              : authView === "login"
              ? <LoginScreen
                  authSelectedUser={authSelectedUser}
                  authPinInput={authPinInput} setAuthPinInput={setAuthPinInput}
                  authPinError={authPinError} setAuthPinError={setAuthPinError}
                  doLogin={doLogin} setAuthView={setAuthView}
                />
              : <UserSelectScreen
                  users={users}
                  setAuthSelectedUser={setAuthSelectedUser}
                  setAuthPinInput={setAuthPinInput}
                  setAuthPinError={setAuthPinError}
                  setAuthView={setAuthView}
                  setAuthNewUsername={setAuthNewUsername}
                  setAuthNewPin={setAuthNewPin}
                  setAuthNewPinConfirm={setAuthNewPinConfirm}
                />
            }
          </div>
        </div>
      );

      return (
        <div style={{ minHeight: "100vh", background: "#000", color: "#e8e4d9", fontFamily: "'IBM Plex Mono', 'Courier New', monospace", display: "flex", flexDirection: "column" }}>
          {/* ── HEADER BAND ── */}
          <div style={{ background: "#0d0d0d", width: "100%" }}>
          <div style={{ maxWidth: 560, margin: "0 auto", padding: "48px 24px 0" }}>

            {/* Header */}
            <div style={{ marginBottom: 40 }}>
              <div style={{ fontSize: 10, letterSpacing: "0.2em", color: "#666", textTransform: "uppercase", marginBottom: 8 }}>
                Diffuse Mode Solutioning
              </div>
              <div style={{ fontSize: 13, color: "#777" }}>{today}</div>
            </div>

            {/* Tabs */}
            <div style={{ display: "flex", gap: 28, marginBottom: 36, borderBottom: "1px solid #1a1a1a" }}>
              {[["tonight", "Tonight"], ["morning", "Morning"], ["log", `Log${activeEntries.length > 0 ? ` (${activeEntries.length})` : ""}`], ["patterns", "Patterns"]].map(([id, label]) => (
                <div key={id} className={`tab ${view === id ? "active" : ""}`} onClick={() => setView(id)}>{label}</div>
              ))}
            </div>
          </div>
          </div>

          {/* ── CONTENT BAND ── */}
          <div style={{ flex: 1, display: "flex", justifyContent: "center" }}>
          <div style={{ width: "100%", maxWidth: 560, padding: "28px 24px 56px" }}>

            {/* ── TONIGHT ── */}
            {view === "tonight" && (
              <div style={{ animation: "fi 0.3s ease" }}>
                <div style={{ fontSize: 17, lineHeight: 1.65, color: "#c8c4b8", marginBottom: 32, fontWeight: 300 }}>
                  {NIGHT_PROMPT}
                </div>
                <textarea
                  ref={nightTextareaRef}
                  className="text-area"
                  value={nightInput}
                  onChange={e => setNightInput(e.target.value)}
                  onKeyDown={e => { if ((e.metaKey || e.ctrlKey) && e.key === "Enter") saveNight(); }}
                  placeholder="Write it out..."
                  rows={5}
                  style={{ marginBottom: 20 }}
                />
                <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
                  <button className="save-btn" onClick={saveNight} disabled={!nightInput.trim()}>
                    {nightSaved ? "✓ Saved" : "Save"}
                  </button>
                </div>

                {mostRecent && (
                  <div style={{ marginTop: 48, paddingTop: 24, borderTop: "1px solid #1a1a1a" }}>
                    <div className="field-label">Last entry</div>
                    <div style={{ fontSize: 11, color: "#666", marginBottom: 6 }}>{formatDate(mostRecent.ts)} · {formatTime(mostRecent.ts)}</div>
                    <div style={{ fontSize: 13, color: "#888", lineHeight: 1.7 }}>{mostRecent.text}</div>
                  </div>
                )}
              </div>
            )}

            {/* ── MORNING ── */}
            {view === "morning" && (
              <div style={{ animation: "fi 0.3s ease" }}>
                {!mostRecent ? (
                  <div style={{ color: "#666", fontSize: 13 }}>No focus entry yet. Set tonight's focus first.</div>
                ) : (
                  <>
                    {/* Context bar */}
                    <div style={{ marginBottom: 28, padding: "12px 16px", background: "#0f0f0f", borderLeft: "2px solid #1e1e1e" }}>
                      <div className="field-label" style={{ marginBottom: 6 }}>Last night's focus</div>
                      <div style={{ fontSize: 13, color: "#888", lineHeight: 1.6 }}>{mostRecent.text}</div>
                    </div>

                    {/* Saved waking entries */}
                    {mostRecentWakings.map((w, i) => (
                      <div key={w.id}>
                        {editingWakingId === w.id ? (
                          /* Edit form for this entry */
                          <div style={{ marginBottom: 20, padding: "16px", background: "#0f0f0f", borderLeft: "1px solid #2a2a2a", animation: "fi 0.2s ease" }}>
                            <div style={{ fontSize: 10, color: "#555", letterSpacing: "0.1em", marginBottom: 16 }}>
                              Waking {mostRecentWakings.length > 1 ? `${i + 1} · ` : ""}editing
                            </div>
                            <div style={{ marginBottom: 20 }}>
                              <div className="field-label">What were you thinking about when you woke up?</div>
                              <textarea className="text-area" value={wakingDraft.wakingThoughts} onChange={e => setWakingDraft(d => ({ ...d, wakingThoughts: e.target.value }))} placeholder="Describe what was on your mind..." rows={4} autoFocus />
                            </div>
                            <div style={{ marginBottom: 20 }}>
                              <div className="field-label">Categories</div>
                              <div style={{ display: "flex", flexWrap: "wrap", marginBottom: 8 }}>
                                {CATEGORIES.map(cat => {
                                  if (cat === "Other") {
                                    const isActive = wakingShowOther || wakingDraft.categories.some(c => !CATEGORIES.includes(c));
                                    return <div key={cat} className={`chip ${isActive ? "selected" : ""}`} onClick={toggleWakingOther}>{cat}</div>;
                                  }
                                  return <div key={cat} className={`chip ${wakingDraft.categories.includes(cat) ? "selected" : ""}`} onClick={() => toggleWakingCategory(cat)}>{cat}</div>;
                                })}
                                {wakingDraft.categories.filter(c => !CATEGORIES.includes(c)).map(c => (
                                  <div key={c} className="chip selected" onClick={() => toggleWakingCategory(c)}>{c} ×</div>
                                ))}
                              </div>
                              {wakingShowOther && (
                                <div>
                                  {allCustomCategories.filter(c => !wakingDraft.categories.includes(c)).length > 0 && (
                                    <div style={{ display: "flex", flexWrap: "wrap", marginBottom: 6 }}>
                                      {allCustomCategories.filter(c => !wakingDraft.categories.includes(c)).map(c => (
                                        <div key={c} className="chip" onClick={() => toggleWakingCategory(c)}>{c}</div>
                                      ))}
                                    </div>
                                  )}
                                  <input className="tag-input" value={wakingCustomTag} onChange={e => setWakingCustomTag(e.target.value)} onKeyDown={e => { if (e.key === "Enter") addWakingCustomTag(); }} placeholder="+ custom tag" autoFocus />
                                </div>
                              )}
                            </div>
                            <div style={{ marginBottom: 20 }}>
                              <div className="field-label">Thoughts or ideas to capture</div>
                              <textarea className="text-area" value={wakingDraft.ideas} onChange={e => setWakingDraft(d => ({ ...d, ideas: e.target.value }))} placeholder="Any ideas, threads, or insights that surfaced..." rows={4} />
                            </div>
                            <div style={{ marginBottom: 20 }}>
                              <div className="toggle-row" onClick={() => setWakingDraft(d => ({ ...d, relatedToFocus: !d.relatedToFocus }))}>
                                <div className={`toggle-box ${wakingDraft.relatedToFocus ? "checked" : ""}`} />
                                <span style={{ fontSize: 12, color: wakingDraft.relatedToFocus ? "#c8c4b8" : "#777", letterSpacing: "0.04em" }}>Related to last night's focus</span>
                              </div>
                            </div>
                            <div style={{ display: "flex", gap: 14, alignItems: "center" }}>
                              <button className="save-btn" style={{ padding: "8px 20px", fontSize: 11 }} onClick={saveWaking} disabled={!wakingDraftHasContent}>Save</button>
                              <button className="ghost-btn" onClick={cancelWaking}>Cancel</button>
                            </div>
                          </div>
                        ) : (
                          /* Read view */
                          <div style={{ marginBottom: 12, padding: "12px 14px", background: "#0f0f0f", borderLeft: "1px solid #1e1e1e" }}>
                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
                              <div style={{ fontSize: 10, color: "#555", letterSpacing: "0.1em" }}>
                                {mostRecentWakings.length > 1 ? `Waking ${i + 1} · ` : "Waking · "}{formatTime(w.ts)}
                              </div>
                              {!editingWakingId && <button className="ghost-btn" onClick={() => startEditWaking(w)}>Edit</button>}
                            </div>
                            {w.wakingThoughts && <div style={{ fontSize: 13, color: "#888", lineHeight: 1.7, marginBottom: 6 }}>{w.wakingThoughts}</div>}
                            {w.categories.length > 0 && <div style={{ fontSize: 10, color: "#666", letterSpacing: "0.06em", marginBottom: 4 }}>{w.categories.map(c => CATEGORIES.includes(c) ? c : `Other: ${c}`).join(" · ")}</div>}
                            {w.ideas && <div style={{ fontSize: 12, color: "#555", lineHeight: 1.65, marginTop: 4, fontStyle: "italic" }}>{w.ideas}</div>}
                            {w.relatedToFocus && <div style={{ fontSize: 10, color: "#555", letterSpacing: "0.06em", marginTop: 6 }}>related to focus</div>}
                          </div>
                        )}
                      </div>
                    ))}

                    {/* New waking entry form */}
                    {editingWakingId === "new" && (
                      <div style={{ marginBottom: 20, padding: "16px", background: "#0f0f0f", borderLeft: "1px solid #2a2a2a", animation: "fi 0.2s ease" }}>
                        <div style={{ fontSize: 10, color: "#555", letterSpacing: "0.1em", marginBottom: 16 }}>
                          {mostRecentWakings.length > 0 ? `Waking ${mostRecentWakings.length + 1}` : "Waking"}
                        </div>
                        <div style={{ marginBottom: 20 }}>
                          <div className="field-label">What were you thinking about when you woke up?</div>
                          <textarea className="text-area" value={wakingDraft.wakingThoughts} onChange={e => setWakingDraft(d => ({ ...d, wakingThoughts: e.target.value }))} placeholder="Describe what was on your mind..." rows={4} autoFocus />
                        </div>
                        <div style={{ marginBottom: 20 }}>
                          <div className="field-label">Categories</div>
                          <div style={{ display: "flex", flexWrap: "wrap", marginBottom: 8 }}>
                            {CATEGORIES.map(cat => {
                              if (cat === "Other") {
                                const isActive = wakingShowOther || wakingDraft.categories.some(c => !CATEGORIES.includes(c));
                                return <div key={cat} className={`chip ${isActive ? "selected" : ""}`} onClick={toggleWakingOther}>{cat}</div>;
                              }
                              return <div key={cat} className={`chip ${wakingDraft.categories.includes(cat) ? "selected" : ""}`} onClick={() => toggleWakingCategory(cat)}>{cat}</div>;
                            })}
                            {wakingDraft.categories.filter(c => !CATEGORIES.includes(c)).map(c => (
                              <div key={c} className="chip selected" onClick={() => toggleWakingCategory(c)}>{c} ×</div>
                            ))}
                          </div>
                          {wakingShowOther && (
                            <div>
                              {allCustomCategories.filter(c => !wakingDraft.categories.includes(c)).length > 0 && (
                                <div style={{ display: "flex", flexWrap: "wrap", marginBottom: 6 }}>
                                  {allCustomCategories.filter(c => !wakingDraft.categories.includes(c)).map(c => (
                                    <div key={c} className="chip" onClick={() => toggleWakingCategory(c)}>{c}</div>
                                  ))}
                                </div>
                              )}
                              <input className="tag-input" value={wakingCustomTag} onChange={e => setWakingCustomTag(e.target.value)} onKeyDown={e => { if (e.key === "Enter") addWakingCustomTag(); }} placeholder="+ custom tag" autoFocus />
                            </div>
                          )}
                        </div>
                        <div style={{ marginBottom: 20 }}>
                          <div className="field-label">Thoughts or ideas to capture</div>
                          <textarea className="text-area" value={wakingDraft.ideas} onChange={e => setWakingDraft(d => ({ ...d, ideas: e.target.value }))} placeholder="Any ideas, threads, or insights that surfaced..." rows={4} />
                        </div>
                        <div style={{ marginBottom: 20 }}>
                          <div className="toggle-row" onClick={() => setWakingDraft(d => ({ ...d, relatedToFocus: !d.relatedToFocus }))}>
                            <div className={`toggle-box ${wakingDraft.relatedToFocus ? "checked" : ""}`} />
                            <span style={{ fontSize: 12, color: wakingDraft.relatedToFocus ? "#c8c4b8" : "#777", letterSpacing: "0.04em" }}>Related to last night's focus</span>
                          </div>
                        </div>
                        <div style={{ display: "flex", gap: 14, alignItems: "center" }}>
                          <button className="save-btn" style={{ padding: "8px 20px", fontSize: 11 }} onClick={saveWaking} disabled={!wakingDraftHasContent}>Save</button>
                          <button className="ghost-btn" onClick={cancelWaking}>Cancel</button>
                        </div>
                      </div>
                    )}

                    {/* Add waking entry button */}
                    {!editingWakingId && (
                      <div style={{ marginTop: mostRecentWakings.length > 0 ? 8 : 0, display: "flex", alignItems: "center", gap: 14 }}>
                        <button className="ghost-btn accent" onClick={startNewWaking}>
                          + {mostRecentWakings.length > 0 ? "Add another waking" : "Log waking thoughts"}
                        </button>
                        {wakingSaved && <span style={{ fontSize: 10, color: "#555", letterSpacing: "0.06em" }}>✓ saved</span>}
                      </div>
                    )}
                  </>
                )}
              </div>
            )}

            {/* ── LOG ── */}
            {view === "log" && (
              <div style={{ animation: "fi 0.3s ease" }}>
                {activeEntries.length === 0 && archivedEntries.length === 0 ? (
                  <div style={{ color: "#666", fontSize: 13 }}>No entries yet.</div>
                ) : (
                  <>
                    {activeEntries.map(entry => (
                      <div key={entry.id} className="entry">
                        {/* Entry header */}
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                          <div style={{ fontSize: 10, color: "#555", letterSpacing: "0.1em" }}>
                            {formatDate(entry.ts)} · {formatTime(entry.ts)}
                            {entry.editedTs && <div style={{ color: "#555", marginTop: 2 }}>edited {formatTime(entry.editedTs)}</div>}
                          </div>
                          <div style={{ display: "flex", gap: 14, flexShrink: 0, marginLeft: 12 }}>
                            {editingId !== entry.id && (
                              <>
                                <button className="ghost-btn accent" onClick={() => startEdit(entry)}>Edit</button>
                                <button className="ghost-btn danger" onClick={() => archiveEntry(entry.id)}>Archive</button>
                              </>
                            )}
                          </div>
                        </div>

                        {/* Entry text or edit textarea */}
                        {editingId === entry.id ? (
                          <div>
                            <textarea
                              className="text-area"
                              value={editDraft}
                              onChange={e => setEditDraft(e.target.value)}
                              rows={4}
                              style={{ marginBottom: 10 }}
                              autoFocus
                            />
                            <div style={{ marginBottom: 12 }}>
                              <div className="field-label" style={{ marginBottom: 4 }}>Date</div>
                              <input type="datetime-local" className="datetime-input" value={editDatetime} onChange={e => setEditDatetime(e.target.value)} />
                            </div>
                            <div style={{ display: "flex", gap: 14 }}>
                              <button className="save-btn" style={{ padding: "8px 20px", fontSize: 11 }} onClick={() => confirmEdit(entry)} disabled={!editDraft.trim()}>Save</button>
                              <button className="ghost-btn" onClick={cancelEdit}>Cancel</button>
                            </div>
                          </div>
                        ) : (
                          <div style={{ fontSize: 13, lineHeight: 1.75, color: "#a8a49a" }}>{entry.text}</div>
                        )}

                        {/* Morning waking log blocks */}
                        {getMorningLogs(entry).length > 0 && getMorningLogs(entry).map((w, wi) => {
                          const isEditingWaking = editingLogWaking?.entryId === entry.id && editingLogWaking?.wakingId === w.id;
                          const wLogs = getMorningLogs(entry);
                          return (
                            <div key={w.id} className="morning-block">
                              {isEditingWaking ? (
                                <div style={{ animation: "fi 0.2s ease" }}>
                                  <div style={{ fontSize: 10, color: "#555", letterSpacing: "0.1em", marginBottom: 14 }}>
                                    {wLogs.length > 1 ? `Waking ${wi + 1} · ` : ""}editing
                                  </div>
                                  <div style={{ marginBottom: 14 }}>
                                    <div className="field-label">Waking thoughts</div>
                                    <textarea className="text-area" value={logWakingDraft.wakingThoughts} onChange={e => setLogWakingDraft(d => ({ ...d, wakingThoughts: e.target.value }))} rows={3} autoFocus />
                                  </div>
                                  <div style={{ marginBottom: 14 }}>
                                    <div className="field-label">Categories</div>
                                    <div style={{ display: "flex", flexWrap: "wrap", marginBottom: 6 }}>
                                      {CATEGORIES.map(cat => {
                                        if (cat === "Other") {
                                          const isActive = logWakingShowOther || logWakingDraft.categories.some(c => !CATEGORIES.includes(c));
                                          return <div key={cat} className={`chip ${isActive ? "selected" : ""}`} onClick={toggleLogWakingOther}>{cat}</div>;
                                        }
                                        return <div key={cat} className={`chip ${logWakingDraft.categories.includes(cat) ? "selected" : ""}`} onClick={() => toggleLogWakingCat(cat)}>{cat}</div>;
                                      })}
                                      {logWakingDraft.categories.filter(c => !CATEGORIES.includes(c)).map(c => (
                                        <div key={c} className="chip selected" onClick={() => toggleLogWakingCat(c)}>{c} ×</div>
                                      ))}
                                    </div>
                                    {logWakingShowOther && (
                                      <div>
                                        {allCustomCategories.filter(c => !logWakingDraft.categories.includes(c)).length > 0 && (
                                          <div style={{ display: "flex", flexWrap: "wrap", marginBottom: 6 }}>
                                            {allCustomCategories.filter(c => !logWakingDraft.categories.includes(c)).map(c => (
                                              <div key={c} className="chip" onClick={() => toggleLogWakingCat(c)}>{c}</div>
                                            ))}
                                          </div>
                                        )}
                                        <input className="tag-input" value={logWakingCustomTag} onChange={e => setLogWakingCustomTag(e.target.value)} onKeyDown={e => { if (e.key === "Enter") addLogWakingCustomTag(); }} placeholder="+ custom tag" autoFocus />
                                      </div>
                                    )}
                                  </div>
                                  <div style={{ marginBottom: 14 }}>
                                    <div className="field-label">Ideas</div>
                                    <textarea className="text-area" value={logWakingDraft.ideas} onChange={e => setLogWakingDraft(d => ({ ...d, ideas: e.target.value }))} rows={3} />
                                  </div>
                                  <div style={{ marginBottom: 14 }}>
                                    <div className="field-label">Date & time</div>
                                    <input type="datetime-local" className="datetime-input" value={logWakingDraft.ts} onChange={e => setLogWakingDraft(d => ({ ...d, ts: e.target.value }))} />
                                  </div>
                                  <div style={{ display: "flex", gap: 12 }}>
                                    <button className="save-btn" style={{ padding: "6px 16px", fontSize: 10 }} onClick={saveLogWaking}>Save</button>
                                    <button className="ghost-btn" onClick={cancelLogWakingEdit}>Cancel</button>
                                  </div>
                                </div>
                              ) : (
                                <>
                                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 6 }}>
                                    <div style={{ fontSize: 10, color: "#666", letterSpacing: "0.1em" }}>
                                      {wLogs.length > 1 ? `Waking ${wi + 1} · ` : "Morning · "}{formatTime(w.ts)}
                                    </div>
                                    {!editingLogWaking && editingId === entry.id && (
                                      <button className="ghost-btn" onClick={() => startLogWakingEdit(entry.id, w)}>Edit</button>
                                    )}
                                  </div>
                                  {w.wakingThoughts && (
                                    <div style={{ fontSize: 12, color: "#666", lineHeight: 1.7, marginBottom: 6 }}>"{w.wakingThoughts}"</div>
                                  )}
                                  {w.categories.length > 0 && (
                                    <div style={{ fontSize: 10, color: "#666", letterSpacing: "0.06em", marginBottom: 4 }}>
                                      {w.categories.map(c => CATEGORIES.includes(c) ? c : `Other: ${c}`).join(" · ")}
                                    </div>
                                  )}
                                  {w.ideas && (
                                    <div style={{ fontSize: 12, color: "#555", lineHeight: 1.65, marginTop: 6, fontStyle: "italic" }}>{w.ideas}</div>
                                  )}
                                  {w.relatedToFocus && <div style={{ fontSize: 10, color: "#555", letterSpacing: "0.06em", marginTop: 6 }}>related to focus</div>}
                                </>
                              )}
                            </div>
                          );
                        })}

                        {/* History */}
                        {entry.history?.length > 0 && editingId !== entry.id && (
                          <div style={{ marginTop: 12 }}>
                            <button
                              className="inline-btn"
                              onClick={() => setExpandedHistory(expandedHistory === entry.id ? null : entry.id)}
                            >
                              {expandedHistory === entry.id ? "▾" : "▸"} History ({entry.history.length})
                            </button>
                            {expandedHistory === entry.id && (
                              <div style={{ marginTop: 10, paddingLeft: 10, borderLeft: "1px solid #1a1a1a", animation: "fi 0.2s ease" }}>
                                {[...entry.history].reverse().map((h, i) => {
                                  const realIdx = entry.history.length - 1 - i;
                                  return (
                                    <div key={i} className="history-item">
                                      <div style={{ flex: 1 }}>
                                        <div style={{ fontSize: 10, color: "#666", letterSpacing: "0.08em", marginBottom: 4 }}>
                                          v{realIdx + 1} · {formatDate(h.ts)} · {formatTime(h.ts)}
                                        </div>
                                        <div style={{ fontSize: 12, color: "#888", lineHeight: 1.6 }}>{h.text}</div>
                                      </div>
                                      <button className="ghost-btn accent" style={{ flexShrink: 0 }} onClick={() => restoreVersion(entry, realIdx)}>
                                        Restore
                                      </button>
                                    </div>
                                  );
                                })}
                              </div>
                            )}
                          </div>
                        )}
                      </div>
                    ))}

                    {/* Archived section */}
                    {archivedEntries.length > 0 && (
                      <div style={{ marginTop: 24 }}>
                        <button className="ghost-btn" onClick={() => setShowArchived(s => !s)} style={{ marginBottom: 16 }}>
                          {showArchived ? "▾" : "▸"} Archived ({archivedEntries.length})
                        </button>
                        {showArchived && archivedEntries.map(entry => (
                          <div key={entry.id} className="entry archived">
                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                              <div style={{ fontSize: 10, color: "#555", letterSpacing: "0.1em" }}>
                                {formatDate(entry.ts)} · {formatTime(entry.ts)}
                                {entry.deletedAt && <span> · archived {formatShortDate(entry.deletedAt)}</span>}
                              </div>
                              <button className="ghost-btn accent" onClick={() => restoreEntry(entry.id)}>Restore</button>
                            </div>
                            <div style={{ fontSize: 13, lineHeight: 1.75, color: "#555" }}>{entry.text}</div>
                          </div>
                        ))}
                      </div>
                    )}

                  </>
                )}
              </div>
            )}

            {/* ── PATTERNS ── */}
            {view === "patterns" && (
              <div style={{ animation: "fi 0.3s ease" }}>
                {activeEntries.length < 3 ? (
                  <div style={{ color: "#666", fontSize: 13 }}>
                    {activeEntries.length === 0
                      ? "No entries yet. Add at least 3 nights to unlock pattern analysis."
                      : `${3 - activeEntries.length} more ${3 - activeEntries.length === 1 ? "entry" : "entries"} until pattern analysis unlocks.`}
                  </div>
                ) : (
                  <>
                    {/* Time box selector */}
                    <div style={{ marginBottom: 18 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6 }}>
                        <div className="field-label" style={{ marginBottom: 0 }}>Analyze entries from</div>
                        <select
                          value={patternTimeBox}
                          onChange={e => { setPatternTimeBox(e.target.value); setInsight(""); setLastUsage(null); setInsightError(""); }}
                          style={{ background: "#111", border: "1px solid #1e1e1e", color: "#c8c4b8", fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, padding: "4px 8px", letterSpacing: "0.04em", cursor: "pointer", colorScheme: "dark" }}
                        >
                          {TIME_BOX_OPTIONS.map(opt => (
                            <option key={opt.value} value={opt.value}>{opt.label}</option>
                          ))}
                        </select>
                      </div>
                      <div style={{ fontSize: 10, color: "#555", letterSpacing: "0.06em" }}>
                        {timeBoxEntries.length} {timeBoxEntries.length === 1 ? "entry" : "entries"} in range
                        {timeBoxEntries.length < 3 && timeBoxEntries.length > 0 && ` · need ${3 - timeBoxEntries.length} more to analyze`}
                        {timeBoxEntries.length === 0 && " · no entries in this range"}
                        {nextRunEstimate && ` · ~${nextRunEstimate.tokens.toLocaleString()} tokens · ~${formatCost(nextRunEstimate.cost)}`}
                      </div>
                    </div>

                    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                      <button className="ghost-btn" onClick={() => setShowApiKeyInput(s => !s)}>
                        {showApiKeyInput ? "▾" : "▸"} {apiKey.trim() ? "Edit API key" : "Add API key"}
                      </button>
                      <button className="insight-btn" onClick={getInsight} disabled={loadingInsight || timeBoxEntries.length < 3}>
                        {loadingInsight ? "Analyzing..." : "Find patterns →"}
                      </button>
                    </div>
                    {showApiKeyInput && (
                      <div style={{ marginTop: 14, marginBottom: 4 }}>
                        <div className="field-label">Anthropic API Key</div>
                        <input className="key-input" type="password" value={apiKey} onChange={e => saveApiKey(e.target.value)} placeholder="sk-ant-..." spellCheck={false} />
                        <div style={{ marginTop: 10, display: "flex", alignItems: "center", gap: 14, flexWrap: "wrap" }}>
                          <div className="toggle-row" onClick={toggleRememberKey} style={{ cursor: "pointer" }}>
                            <div className={`toggle-box ${rememberKey ? "checked" : ""}`} />
                            <span style={{ fontSize: 10, color: rememberKey ? "#c8c4b8" : "#666", letterSpacing: "0.08em" }}>Remember key</span>
                          </div>
                          {rememberKey && apiKey && (
                            <button className="ghost-btn danger" onClick={removeStoredKey}>Remove saved key</button>
                          )}
                        </div>
                      </div>
                    )}
                    {insightError && <div style={{ marginTop: 14, fontSize: 12, color: "#5a3a3a", lineHeight: 1.6 }}>{insightError}</div>}
                    {insight && (
                      <div style={{ marginTop: 20, animation: "fi 0.4s ease" }}>
                        <div className="insight-md" style={{ padding: "16px 16px 28px", background: "#111", border: "1px solid #1a1a1a", fontSize: 13, lineHeight: 1.85, color: "#777" }}
                          dangerouslySetInnerHTML={{ __html: window.marked.parse(insight) }}
                        />
                        {lastUsage && (
                          <div style={{ marginTop: 6, fontSize: 10, color: "#555", letterSpacing: "0.06em", display: "flex", gap: 16 }}>
                            <span>{lastUsage.inputTokens.toLocaleString()} in · {lastUsage.outputTokens.toLocaleString()} out</span>
                            <span>est. {formatCost(lastUsage.costUsd)}</span>
                          </div>
                        )}
                      </div>
                    )}

                    {/* Pattern history */}
                    {patternHistory.length > 0 && (
                      <div style={{ marginTop: 24, paddingTop: 16, borderTop: "1px solid #1e1e1e" }}>
                        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 6 }}>
                          <button className="inline-btn" onClick={() => setShowPatternHistory(s => !s)}>
                            {showPatternHistory ? "▾" : "▸"} Pattern history ({patternHistory.length})
                          </button>
                          {totalCostUsd > 0 && (
                            <span style={{ fontSize: 10, color: "#555", letterSpacing: "0.06em" }}>
                              total est. {formatCost(totalCostUsd)}
                            </span>
                          )}
                        </div>
                        {showPatternHistory && (
                          <div style={{ paddingLeft: 10, borderLeft: "1px solid #1a1a1a", animation: "fi 0.2s ease" }}>
                            {patternHistory.map(rec => (
                              <div key={rec.id} style={{ padding: "16px 0", borderBottom: "1px solid #1e1e1e" }}>
                                <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 6 }}>
                                  <span style={{ fontSize: 10, color: "#666", letterSpacing: "0.08em" }}>{formatDate(rec.ts)}</span>
                                  <span style={{ fontSize: 10, color: "#555" }}>
                                    {TIME_BOX_OPTIONS.find(o => o.value === rec.timeBox)?.label ?? rec.timeBox} · {rec.entriesCount} {rec.entriesCount === 1 ? "entry" : "entries"}
                                  </span>
                                  {rec.usage?.inputTokens != null && (
                                    <span style={{ fontSize: 10, color: "#555" }}>
                                      {(rec.usage.inputTokens + rec.usage.outputTokens).toLocaleString()} tokens · est. {formatCost(rec.usage.costUsd)}
                                    </span>
                                  )}
                                </div>
                                <div className="insight-md" style={{ fontSize: 12, color: "#555", lineHeight: 1.75 }}
                                  dangerouslySetInnerHTML={{ __html: window.marked.parse(rec.insight) }}
                                />
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                    )}
                  </>
                )}
              </div>
            )}

          </div>
          </div>

          {/* ── FOOTER BAND ── */}
          <div style={{ background: "#0d0d0d", width: "100%" }}>
          <div style={{ maxWidth: 560, margin: "0 auto", padding: "24px 24px 32px" }}>
            {/* Global footer */}
            <div style={{ fontSize: 10, color: "#666", letterSpacing: "0.05em", lineHeight: 1.8 }}>
              <div>Data is stored locally and never shared without your permission.</div>
              <div>'Find Patterns' sends data to Anthropic.</div>
              <div style={{ marginTop: 12 }}>
                <span>Export data as: </span>
                <button className="ghost-btn" style={{ fontSize: 10, display: "inline", padding: "2px 6px" }} onClick={() => exportData("txt")}>Text</button>
                <span style={{ margin: "0 6px" }}>|</span>
                <button className="ghost-btn" style={{ fontSize: 10, display: "inline", padding: "2px 6px" }} onClick={() => exportData("json")}>JSON</button>
              </div>
              <div style={{ marginTop: 12 }}>
                <div style={{ display: "flex", gap: 20 }}>
                  <button className="ghost-btn danger" style={{ fontSize: 10 }} onClick={() => setShowClearConfirm(s => !s)}>
                    Clear all data
                  </button>
                  <button className="ghost-btn" style={{ fontSize: 10 }} onClick={logout}>
                    Log out ({currentUser && currentUser.username})
                  </button>
                </div>
                {showClearConfirm && (
                  <div style={{ marginTop: 10 }}>
                    <div style={{ fontSize: 11, color: "#888", marginBottom: 10 }}>
                      This action cannot be undone. It will clear all data including nightly focus, waking thoughts, and API key &amp; pattern analysis results. Are you sure?
                    </div>
                    <div style={{ display: "flex", gap: 20 }}>
                      <button className="ghost-btn danger" onClick={clearAllData}>Yes</button>
                      <button className="ghost-btn" onClick={() => setShowClearConfirm(false)}>Cancel</button>
                    </div>
                  </div>
                )}
              </div>
            </div>

          </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
